<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabs com api</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="Tabs">
        <button class="tab-btn active" onclick="abrirTab(0)">IMC</button>
        <button class="tab-btn" onclick="abrirTab(1)">Média</button>
    </div>

    <a id=logout class="logout-link" onclick="logout()"> logout</a>
    <a id=onblur class="onblur-link" onclick="onblur()"> onblur</a>
 
    <div class="tab-content active">
        <h2>cadrastro cliente</h2>
        <input type="text" id="nome" placeholder="Digite seu nome">
        <input type="number" id="CPF" placeholder="Digite seu CPF">
        <input type="number" id="CEP" placeholder="Digite seu CEP">
        
        <button onclick="cadrastrar()">cadrastrar</button>
        <div class="resultado" id="buscarEndereco"></div>
    </div>


    <div class="tab-content ">
        <h2>Calcular o média</h2>
        <input type="text" id="nome2" placeholder="Digite seu nome">
        <input type="number" id="nota1" placeholder="Digite sua primeira nota">
        <input type="number" id="nota2" placeholder="Digite sua segunda nota">

        <button onclick="calcularMedia()">Calcular MÉDIA</button>
        <div class="resultado" id="resultadoMedia"></div>

        
    <script src="index.js"></script>
</body>

</html>
