<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabs com api</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="Tabs">
        <button class="tab-btn active" onclick="abrirTab(0)">IMC</button>
        <button class="tab-btn" onclick="abrirTab(1)">Média</button>
    </div>

    <div class="tab-content active">
        <h2>Calcular o IMC</h2>
        <input type="text" id="nome" placeholder="Digite seu nome">
        <input type="number" id="idade" placeholder="Digite sua idade">
        <input type="number" id="altura" placeholder="Digite sua altura">
        <input type="number" id="peso" placeholder="Digite seu peso">
        <button onclick="calcularImc()">Calcular IMC</button>
        <div class="resultado" id="resultadoImc"></div>
    </div>
    
    <script>
        function abrirTab(index) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'))
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'))

            document.querySelectorAll('.tab-content')[index].classList.add('active')
            document.querySelectorAll('.tab-btn')[index].classList.add('active')
        }
        function formatarResposta(resultado){
            if(resultado.erro){
                return `<div style="color:#721c24;padding:15px;background:3f8d7da;border:1px solid #f5c6cb;border-radius:5px;font-weight:bold">
                  erro:${resultado.erro}</div>`; 
                }
                let html=`<div style="padding:15px;background:#d4eda;color:#155724;border:1px: solid #c3e6cb;border-radius:5px;"`
              html+=`<h3 style="margin-top=0;margin-bottom:15px; border-bottom:1px solid #c3e6cb;padding-bottom:5px;">sucesso</h3>`
              html+=`<ul style="list-style=type:none;padding-left:0;margin:0"`;

              for(const[key,value]of Object.entries[resultado]){
                let label=key.charAt(0).toLocaleUpperCase()+key.slice(1)
                if(key.toLocaleUpperCase()==="imc"){
                    label="IMC";
                }
                html+=`<li style="margin-bottom:8px;font-size:16px;">
                    <strong style="color:#0b2e13">${label}</strong> ${value}
                    </li>`
              }
              html+=`</ul>
              <div>`;
                return html;
             }
            async function calcularImc(){
            const dados = {
                nome: document.getElementById('nome').value,
                idade: document.getElementById('idade').value,
                altura: document.getElementById('altura').value,
                peso: document.getElementById('peso').value,
            }
            try {
                const Res = await fetch("http://localhost:3000/imc", {
                    mathod: "POST", 
                    headers: {
                        "content-type": "application/json"
                    },
                    body:JSON.stringify(dados)
                });
                const resultado = await res.json();
                document.getElementById("resultadoImc").innerHTML = formatarResposta(resultado)
             } catch (error) {
                document.getElementById("resultadoImc").innerHTML = formatarResposta({
                    erro: " Ocorreu um erro inesperado. Por favor tente novamente mais tarde."
                }); 
            }

            }
        
    </script>
</body>

</html>
